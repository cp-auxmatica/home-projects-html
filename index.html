<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Family Planner</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Inter:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js'></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
        }

        .planner-title {
            font-family: 'Pacifico', cursive;
        }

        .page-view {
            animation: fadeIn 0.3s ease-in-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .nav-icon.active {
            color: #2563eb;
            background-color: #eff6ff;
        }

        .category-card {
            transition: all 0.2s;
        }

        .category-card:hover {
            transform: translateY(-2px);
            border-color: #3b82f6;
        }

        .category-card.selected {
            border: 2px solid #2563eb;
            background-color: #eff6ff;
            color: #1d4ed8;
        }

        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }
    </style>
</head>

<body class="text-slate-800 h-screen flex flex-col overflow-hidden">

    <header class="bg-white border-b px-6 py-3 flex justify-between items-center flex-shrink-0 z-20">
        <div class="flex items-center gap-3">
            <h1 class="planner-title text-3xl text-blue-600">family</h1>
            <span class="text-xs font-bold tracking-widest text-slate-400 uppercase border-l pl-3 py-1">Planner</span>
        </div>
        <div class="flex gap-3">
            <button onclick="app.openNewItemModal()"
                class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg font-medium flex items-center shadow-sm transition-colors">
                <i data-lucide="plus" class="w-4 h-4 mr-2"></i>New
            </button>
            <button onclick="openModal('settingsModal')"
                class="p-2 text-slate-500 hover:bg-slate-100 rounded-lg transition-colors">
                <i data-lucide="settings" class="w-5 h-5"></i>
            </button>
        </div>
    </header>

    <div class="flex flex-1 overflow-hidden">
        <nav class="w-20 bg-white border-r flex flex-col items-center py-6 gap-6 flex-shrink-0 z-10">
            <button class="nav-icon p-3 rounded-xl text-slate-400 hover:text-blue-600 transition-colors"
                data-view="kanban" onclick="app.setView('kanban')"><i data-lucide="layout-grid"
                    class="w-6 h-6"></i></button>
            <button class="nav-icon p-3 rounded-xl text-slate-400 hover:text-blue-600 transition-colors"
                data-view="list" onclick="app.setView('list')"><i data-lucide="list" class="w-6 h-6"></i></button>
            <button class="nav-icon p-3 rounded-xl text-slate-400 hover:text-blue-600 transition-colors"
                data-view="calendar" onclick="app.setView('calendar')"><i data-lucide="calendar"
                    class="w-6 h-6"></i></button>
            <button class="nav-icon p-3 rounded-xl text-slate-400 hover:text-blue-600 transition-colors"
                data-view="budget" onclick="app.setView('budget')"><i data-lucide="dollar-sign"
                    class="w-6 h-6"></i></button>
        </nav>

        <main class="flex-1 overflow-y-auto bg-slate-50 p-6 md:p-8 relative">
            <div id="kanban-view" class="page-view grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 h-full"></div>

            <div id="list-view" class="page-view max-w-5xl mx-auto space-y-6">
            </div>

            <div id="calendar-view" class="page-view bg-white p-6 rounded-2xl shadow-sm border max-w-6xl mx-auto">
                <div id="calendar"></div>
            </div>
            <div id="budget-view" class="page-view max-w-6xl mx-auto"></div>
        </main>
    </div>

    <div id="projectModal"
        class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm flex items-center justify-center p-4 hidden z-50">
        <div
            class="bg-white rounded-2xl shadow-2xl w-full max-w-3xl max-h-[90vh] flex flex-col overflow-hidden transform transition-all">

            <div class="bg-white px-6 py-4 border-b flex justify-between items-center flex-shrink-0">
                <h3 class="text-xl font-bold text-slate-800" id="projectModalTitle">New Item</h3>
                <button onclick="closeModal('projectModal')" class="text-slate-400 hover:text-slate-600"><i
                        data-lucide="x" class="w-6 h-6"></i></button>
            </div>

            <form id="projectForm" class="flex-1 overflow-y-auto p-6 space-y-6">
                <input type="hidden" id="projectId">

                <div class="space-y-2">
                    <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider">Category</label>
                    <div id="category-selector-container" class="grid grid-cols-2 md:grid-cols-5 gap-3"></div>
                    <input type="hidden" id="selectedCategoryId" required>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Title</label>
                        <input type="text" id="projectName"
                            class="w-full border-slate-300 rounded-lg text-sm focus:ring-blue-500 focus:border-blue-500"
                            placeholder="Title..." required>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Status</label>
                        <select id="projectStatus" class="w-full border-slate-300 rounded-lg text-sm">
                            <option>Not Started</option>
                            <option>In Progress</option>
                            <option>Blocked</option>
                            <option>Done</option>
                        </select>
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Description</label>
                    <textarea id="projectDescription" rows="4" placeholder="Add a description..."
                        class="w-full border-slate-300 rounded-lg text-sm"></textarea>
                </div>

                <div id="dynamic-fields" class="bg-slate-50 rounded-xl p-5 border border-slate-200 space-y-4">

                    <div id="fields-event" class="hidden space-y-4">
                        <div
                            class="flex items-center gap-2 text-purple-700 font-semibold border-b border-purple-200 pb-2">
                            <i data-lucide="calendar-heart" class="w-4 h-4"></i> Event Details</div>
                        <div class="grid grid-cols-2 gap-4">
                            <div><label class="text-xs font-bold text-slate-500">Date</label><input id="eventDate"
                                    type="date" class="w-full rounded-md border-slate-300 text-sm"></div>
                            <div><label class="text-xs font-bold text-slate-500">Time</label><input id="eventTime"
                                    type="time" class="w-full rounded-md border-slate-300 text-sm"></div>
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <div><label class="text-xs font-bold text-slate-500">Location</label><input
                                    id="eventLocation" type="text" class="w-full rounded-md border-slate-300 text-sm">
                            </div>
                            <div class="flex items-end pb-2"><label
                                    class="flex items-center gap-2 cursor-pointer"><input id="eventTickets"
                                        type="checkbox" class="rounded text-purple-600"><span
                                        class="text-sm font-medium text-slate-700">Tickets Purchased?</span></label>
                            </div>
                        </div>
                    </div>

                    <div id="fields-party" class="hidden space-y-4">
                        <div class="flex items-center gap-2 text-pink-700 font-semibold border-b border-pink-200 pb-2">
                            <i data-lucide="party-popper" class="w-4 h-4"></i> Party Details</div>
                        <div class="grid grid-cols-2 gap-4">
                            <div><label class="text-xs font-bold text-slate-500">Date</label><input id="partyDate"
                                    type="date" class="w-full rounded-md border-slate-300 text-sm"></div>
                            <div><label class="text-xs font-bold text-slate-500">Time</label><input id="partyTime"
                                    type="time" class="w-full rounded-md border-slate-300 text-sm"></div>
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <div><label class="text-xs font-bold text-slate-500">Theme</label><input id="partyTheme"
                                    type="text" class="w-full rounded-md border-slate-300 text-sm"></div>
                            <div><label class="text-xs font-bold text-slate-500">Guest Count</label><input
                                    id="partyGuests" type="number" class="w-full rounded-md border-slate-300 text-sm">
                            </div>
                        </div>
                        <div><label class="text-xs font-bold text-slate-500">Location</label><input id="partyLocation"
                                type="text" class="w-full rounded-md border-slate-300 text-sm"></div>
                    </div>

                    <div id="fields-vacation" class="hidden space-y-4">
                        <div class="flex items-center gap-2 text-blue-700 font-semibold border-b border-blue-200 pb-2">
                            <i data-lucide="plane" class="w-4 h-4"></i> Vacation Details</div>
                        <div class="grid grid-cols-2 gap-4">
                            <div><label class="text-xs font-bold text-slate-500">Destination</label><input
                                    id="vacationDest" type="text" class="w-full rounded-md border-slate-300 text-sm">
                            </div>
                            <div><label class="text-xs font-bold text-slate-500">Lodging</label><input
                                    id="vacationHotel" type="text" class="w-full rounded-md border-slate-300 text-sm">
                            </div>
                        </div>
                        <div><label class="text-xs font-bold text-slate-500">Travel Info</label><input
                                id="vacationTravel" type="text" class="w-full rounded-md border-slate-300 text-sm"
                                placeholder="Flights / Car"></div>
                    </div>

                    <div id="fields-project" class="hidden space-y-4">
                        <div
                            class="flex items-center gap-2 text-orange-700 font-semibold border-b border-orange-200 pb-2">
                            <i data-lucide="hammer" class="w-4 h-4"></i> Project Details</div>
                        <div class="grid grid-cols-2 gap-4">
                            <div><label class="text-xs font-bold text-slate-500">Type</label><select id="projectType"
                                    class="w-full rounded-md border-slate-300 text-sm"
                                    onchange="app.toggleContractor()">
                                    <option value="DIY">DIY</option>
                                    <option value="Contractor">Contractor</option>
                                </select></div>
                            <div id="div-contractor" class="hidden"><label
                                    class="text-xs font-bold text-slate-500">Contractor</label><select
                                    id="projectContractor" class="w-full rounded-md border-slate-300 text-sm"></select>
                            </div>
                        </div>
                    </div>

                    <div id="fields-goal" class="hidden space-y-4">
                        <div
                            class="flex items-center gap-2 text-emerald-700 font-semibold border-b border-emerald-200 pb-2">
                            <i data-lucide="target" class="w-4 h-4"></i> Goal Tracking</div>
                        <p class="text-xs text-slate-500">Set milestones below to track progress.</p>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                    <div id="common-date-container">
                        <label class="block text-sm font-medium text-slate-700 mb-1">Timeline</label>
                        <div class="flex items-center gap-2">
                            <input type="date" id="projectStartDate" class="w-full border-slate-300 rounded-lg text-sm">
                            <div id="endDateContainer" class="flex items-center gap-2 w-full">
                                <span class="text-slate-400 text-xs">to</span>
                                <input type="date" id="projectEndDate"
                                    class="w-full border-slate-300 rounded-lg text-sm">
                            </div>
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1" id="lbl-cost">Budget</label>
                        <div class="relative"><span class="absolute left-3 top-2 text-slate-400">$</span><input
                                type="number" id="projectQuote" class="w-full pl-7 border-slate-300 rounded-lg text-sm"
                                placeholder="0.00"></div>
                    </div>
                </div>

                <div>
                    <div class="flex justify-between items-center mb-2">
                        <label class="block text-sm font-medium text-slate-700" id="lbl-materials">Shopping List</label>
                        <button type="button" onclick="app.addMaterialRow()"
                            class="text-xs text-blue-600 font-bold hover:underline">+ Add Item</button>
                    </div>
                    <div id="materialsList" class="space-y-2 bg-slate-50 p-3 rounded-lg border border-slate-100"></div>
                </div>

                <div>
                    <div class="flex justify-between items-center mb-2">
                        <label class="block text-sm font-medium text-slate-700" id="lbl-subtasks">Checklist</label>
                        <button type="button" onclick="app.addSubtaskRow()"
                            class="text-xs text-blue-600 font-bold hover:underline">+ Add Task</button>
                    </div>
                    <div id="subtasksContainer" class="space-y-2 bg-slate-50 p-3 rounded-lg border border-slate-100">
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-2">Who is involved?</label>
                    <div id="projectFamilyMembers" class="flex flex-wrap gap-2"></div>
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Notes</label>
                    <textarea id="projectNotes" rows="2" class="w-full border-slate-300 rounded-lg text-sm"></textarea>
                </div>
            </form>

            <div class="bg-white border-t px-6 py-4 flex justify-between items-center flex-shrink-0">
                <button type="button" id="deleteProjectBtn"
                    class="text-red-500 hover:text-red-700 text-sm font-bold">Delete</button>
                <div class="flex gap-3">
                    <button onclick="closeModal('projectModal')"
                        class="px-4 py-2 text-slate-700 border rounded-lg font-medium hover:bg-slate-50">Cancel</button>
                    <button onclick="app.saveProject(event)"
                        class="px-6 py-2 text-white bg-blue-600 rounded-lg font-medium hover:bg-blue-700 shadow-sm">Save</button>
                </div>
            </div>
        </div>
    </div>

    <div id="settingsModal"
        class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm flex items-center justify-center p-4 hidden z-50">
        <div class="bg-white rounded-2xl shadow-xl w-full max-w-4xl p-6">
            <h3 class="font-bold text-2xl mb-4">Settings & Data</h3>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <div>
                    <h4 class="font-bold text-slate-700 mb-2">Family</h4>
                    <ul id="familyList" class="space-y-2 mb-2"></ul>
                    <div class="flex gap-2"><input id="newFamilyMember" placeholder="Name"
                            class="border rounded px-2 py-1 w-full"><button onclick="app.addListItem('family')"
                            class="bg-blue-600 text-white px-3 rounded">Add</button></div>
                </div>
                <div>
                    <h4 class="font-bold text-slate-700 mb-2">Contractors</h4>
                    <ul id="contractorList" class="space-y-2 mb-2"></ul>
                    <div class="flex gap-2"><input id="newContractorName" placeholder="Name"
                            class="border rounded px-2 py-1 w-full"><button onclick="app.addListItem('contractors')"
                            class="bg-blue-600 text-white px-3 rounded">Add</button></div>
                </div>
            </div>
            <div class="mt-6 flex justify-end gap-2 border-t pt-4">
                <button onclick="app.exportData()" class="text-blue-600 font-bold px-4">Export</button>
                <button onclick="closeModal('settingsModal')"
                    class="bg-slate-100 px-4 py-2 rounded-lg font-bold">Close</button>
                <input type="file" id="importFile" class="hidden" onchange="app.importData(event)">
                <button onclick="document.getElementById('importFile').click()"
                    class="text-yellow-600 font-bold px-4">Import</button>
            </div>
        </div>
    </div>

    <div id="toastContainer"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, addDoc, setDoc, deleteDoc, onSnapshot, getDocs, writeBatch } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        window.openModal = (id) => document.getElementById(id).classList.remove('hidden');
        window.closeModal = (id) => document.getElementById(id).classList.add('hidden');

        const db = {
            _db: null, _auth: null, _userId: null,
            async init() {
                const config = { apiKey: "AIzaSyCUDhmVElLjp2Wx4yw1LUnPMR93PCVXRxM", authDomain: "home-projects-50c9f.firebaseapp.com", projectId: "home-projects-50c9f" };
                const app = initializeApp(config);
                this._db = getFirestore(app);
                this._auth = getAuth(app);
                return new Promise(resolve => {
                    this._auth.onAuthStateChanged(async user => {
                        if (user) { this._userId = user.uid; resolve(); }
                        else { await signInAnonymously(this._auth); this._userId = this._auth.currentUser.uid; resolve(); }
                    });
                });
            },
            getRef(c) { return collection(this._db, 'artifacts', 'household-planner-v3', 'public', 'data', c); },
            listen(c, cb) { return onSnapshot(this.getRef(c), s => cb(s.docs.map(d => ({ id: d.id, ...d.data() })))); },
            async add(c, d) { return await addDoc(this.getRef(c), d); },
            async put(c, d) { return await setDoc(doc(this.getRef(c), d.id), d); },
            async delete(c, id) { return await deleteDoc(doc(this.getRef(c), id)); },
            async getAll(c) { const s = await getDocs(this.getRef(c)); return s.docs.map(d => ({ id: d.id, ...d.data() })); },
            async importDB(data) {
                const batch = writeBatch(this._db);
                for (const k of ['projects', 'family', 'contractors', 'categories']) {
                    if (data[k]) data[k].forEach(i => {
                        const ref = i.id ? doc(this.getRef(k), i.id) : doc(this.getRef(k));
                        batch.set(ref, i);
                    });
                }
                await batch.commit();
            }
        };

        const app = {
            state: { view: 'kanban', projects: [], family: [], contractors: [], categories: [], filterCat: 'All', sortBy: 'Date' },

            catTypes: [
                { name: 'Vacation', icon: 'plane', color: 'blue', formId: 'fields-vacation' },
                { name: 'Event', icon: 'calendar-heart', color: 'purple', formId: 'fields-event' },
                { name: 'Party', icon: 'party-popper', color: 'pink', formId: 'fields-party' },
                { name: 'Home Project', icon: 'hammer', color: 'orange', formId: 'fields-project' },
                { name: 'Family Goal', icon: 'target', color: 'emerald', formId: 'fields-goal' }
            ],

            async init() {
                try {
                    await db.init();
                    db.listen('categories', (data) => {
                        this.state.categories = data;
                        if (data.length === 0) this.catTypes.forEach(c => db.add('categories', c));
                        this.render();
                    });
                    ['projects', 'family', 'contractors'].forEach(c => db.listen(c, d => { this.state[c] = d; this.render(); }));
                    lucide.createIcons();
                } catch (e) { console.error(e); }
            },

            render() {
                this.renderKanban(); this.renderList(); this.renderCalendar(); this.renderBudget();
                this.setView(this.state.view); lucide.createIcons();
            },

            setView(v) {
                this.state.view = v;
                document.querySelectorAll('.page-view').forEach(e => e.style.display = 'none');
                document.getElementById(`${v}-view`).style.display = '';
                document.querySelectorAll('.nav-icon').forEach(e => e.classList.remove('active'));
                document.querySelector(`button[data-view="${v}"]`).classList.add('active');
                if (v === 'calendar' && this.calendar) setTimeout(() => this.calendar.render(), 100);
            },

            // HELPER: Sort & Filter
            getProcessedItems() {
                let items = [...this.state.projects];
                // Filter
                if (this.state.filterCat !== 'All') {
                    items = items.filter(p => this.getCat(p.categoryId).name === this.state.filterCat);
                }
                // Sort
                items.sort((a, b) => {
                    if (this.state.sortBy === 'Name') return a.name.localeCompare(b.name);
                    if (this.state.sortBy === 'Cost') return (b.quote || 0) - (a.quote || 0);
                    // Default Date
                    return new Date(a.startDate || '9999') - new Date(b.startDate || '9999');
                });
                return items;
            },

            renderKanban() {
                const cols = { 'Not Started': [], 'In Progress': [], 'Blocked': [], 'Done': [] };
                this.getProcessedItems().forEach(p => { if (cols[p.status]) cols[p.status].push(p); });
                document.getElementById('kanban-view').innerHTML = Object.keys(cols).map(k => `
                    <div class="flex flex-col h-full bg-slate-100 rounded-xl p-3">
                        <h3 class="font-bold text-slate-500 mb-3 px-1 text-xs tracking-wider uppercase flex items-center">
                            <span class="w-2 h-2 rounded-full mr-2 ${k === 'Done' ? 'bg-green-500' : 'bg-blue-500'}"></span>${k}
                        </h3>
                        <div class="space-y-3 flex-1 overflow-y-auto pr-1 custom-scrollbar">${cols[k].map(p => this.cardHTML(p)).join('')}</div>
                    </div>`).join('');
            },

            renderList() {
                const items = this.getProcessedItems();
                const container = document.getElementById('list-view');

                // Controls
                let html = `<div class="flex flex-wrap gap-3 mb-4 bg-white p-3 rounded-xl border shadow-sm items-center">
                    <span class="text-xs font-bold text-slate-500 uppercase">Filter:</span>
                    <select onchange="app.state.filterCat=this.value; app.render()" class="text-sm border-slate-300 rounded-md py-1">
                        <option value="All">All Categories</option>
                        ${this.state.categories.map(c => `<option ${this.state.filterCat === c.name ? 'selected' : ''}>${c.name}</option>`).join('')}
                    </select>
                    <span class="text-xs font-bold text-slate-500 uppercase ml-4">Sort:</span>
                    <select onchange="app.state.sortBy=this.value; app.render()" class="text-sm border-slate-300 rounded-md py-1">
                        <option value="Date" ${this.state.sortBy === 'Date' ? 'selected' : ''}>Date</option>
                        <option value="Name" ${this.state.sortBy === 'Name' ? 'selected' : ''}>Name</option>
                        <option value="Cost" ${this.state.sortBy === 'Cost' ? 'selected' : ''}>Cost</option>
                    </select>
                </div>`;

                // Groups
                const groups = {};
                items.forEach(p => {
                    const c = this.getCat(p.categoryId).name;
                    if (!groups[c]) groups[c] = [];
                    groups[c].push(p);
                });

                if (Object.keys(groups).length === 0) html += `<div class="text-center py-20 text-slate-400">No items match your filter.</div>`;
                else {
                    html += Object.keys(groups).map(g => `
                    <div class="bg-white rounded-xl shadow-sm border overflow-hidden">
                        <div class="bg-slate-50 px-4 py-2 border-b font-bold text-slate-700">${g}</div>
                        <div class="divide-y">${groups[g].map(p => `
                            <div onclick="app.editProject('${p.id}')" class="px-4 py-3 hover:bg-slate-50 cursor-pointer flex justify-between items-center gap-4">
                                <div class="min-w-0">
                                    <div class="font-semibold">${p.name}</div>
                                    <div class="text-xs text-slate-500 flex gap-2">
                                        <span>${p.startDate || 'No date'}</span>
                                        ${(p.details?.destination || p.details?.eventLocation || p.details?.partyTheme) ? `<span class="text-slate-400">|</span> <span>${p.details?.destination || p.details?.eventLocation || p.details?.partyTheme}</span>` : ''}
                                    </div>
                                    ${p.description ? `<div class="text-xs text-slate-500 mt-1 truncate">${this.escapeHtml(p.description)}</div>` : ''}
                                </div>
                                <span class="text-sm font-bold text-slate-600 flex-shrink-0">$${p.quote || 0}</span>
                            </div>`).join('')}
                        </div>
                    </div>`).join('');
                }
                container.innerHTML = html;
            },

            cardHTML(p) {
                const cat = this.getCat(p.categoryId);
                return `<div onclick="app.editProject('${p.id}')" class="bg-white p-3 rounded-lg border shadow-sm hover:border-blue-300 cursor-pointer">
                    <div class="flex justify-between items-start mb-2">
                        <div class="bg-${cat.color}-50 text-${cat.color}-700 px-2 py-0.5 rounded text-[10px] font-bold uppercase flex items-center gap-1">
                            <i data-lucide="${cat.icon}" class="w-3 h-3"></i> ${cat.name}
                        </div>
                    </div>
                    <h4 class="font-bold text-slate-800">${p.name}</h4>
                    ${p.description ? `<p class="text-xs text-slate-500 mt-1 line-clamp-2">${this.escapeHtml(p.description)}</p>` : ''}
                    <div class="mt-2 pt-2 border-t flex justify-between text-xs text-slate-500">
                        <span>${p.startDate || ''}</span><span>$${p.quote || 0}</span>
                    </div>
                </div>`;
            },

            renderCalendar() {
                if (!this.calendar) {
                    this.calendar = new FullCalendar.Calendar(document.getElementById('calendar'), {
                        initialView: 'dayGridMonth', headerToolbar: { left: 'title', right: 'prev,next' }, height: 'auto',
                        eventClick: (info) => this.editProject(info.event.id)
                    });
                    this.calendar.render();
                }
                this.calendar.removeAllEvents();
                this.calendar.addEventSource(this.state.projects.filter(p => p.startDate).map(p => ({
                    id: p.id, title: p.name, start: p.startDate, end: p.endDate, backgroundColor: p.status === 'Done' ? '#10b981' : '#3b82f6'
                })));
            },

            renderBudget() {
                let total = 0; const years = {}, months = {};
                this.state.projects.forEach(p => {
                    const c = parseFloat(p.quote) || 0;
                    if (c > 0) {
                        total += c;
                        const d = p.startDate;
                        if (d) {
                            const y = d.substring(0, 4), m = d.substring(0, 7);
                            years[y] = (years[y] || 0) + c;
                            months[m] = (months[m] || 0) + c;
                        }
                    }
                });

                let html = `<div class="bg-white p-6 rounded-xl shadow text-center mb-6"><h2 class="text-4xl font-bold text-slate-800">$${total.toLocaleString()}</h2><p class="text-slate-500 text-xs font-bold uppercase">Lifetime Total</p></div>`;
                html += `<div class="grid grid-cols-1 md:grid-cols-2 gap-6">`;
                html += `<div><h3 class="font-bold mb-3 border-b pb-1">By Year</h3><div class="space-y-2">${Object.keys(years).sort().reverse().map(y => `<div class="flex justify-between bg-white p-3 rounded border"><span>${y}</span><span class="font-bold">$${years[y].toLocaleString()}</span></div>`).join('')}</div></div>`;
                html += `<div><h3 class="font-bold mb-3 border-b pb-1">By Month</h3><div class="space-y-2 h-64 overflow-y-auto custom-scrollbar">${Object.keys(months).sort().reverse().map(m => `<div class="flex justify-between bg-white p-3 rounded border"><span>${m}</span><span class="font-bold">$${months[m].toLocaleString()}</span></div>`).join('')}</div></div>`;
                html += `</div>`;
                document.getElementById('budget-view').innerHTML = html;
            },

            // --- FORM LOGIC ---
            openNewItemModal() {
                this.resetForm();
                document.getElementById('projectModalTitle').innerText = 'New Plan';
                if (this.state.categories.length) this.selectCategory(this.state.categories[0].id);
                openModal('projectModal');
            },

            editProject(id) {
                const p = this.state.projects.find(x => x.id === id);
                if (!p) return;
                this.resetForm();

                document.getElementById('projectId').value = p.id;
                document.getElementById('projectName').value = p.name;
                document.getElementById('projectStatus').value = p.status;
                document.getElementById('projectQuote').value = p.quote;
                document.getElementById('projectNotes').value = Array.isArray(p.notes) ? p.notes.map(n => n.text).join('\n\n') : (p.notes || '');
                document.getElementById('projectDescription').value = p.description || '';

                // Common Date Fallback
                document.getElementById('projectStartDate').value = p.startDate || '';
                document.getElementById('projectEndDate').value = p.endDate || '';

                this.selectCategory(p.categoryId);

                // Populate Details safely
                const d = p.details || {};
                if (d.destination) document.getElementById('vacationDest').value = d.destination;
                if (d.accommodation) document.getElementById('vacationHotel').value = d.accommodation;
                if (d.travelInfo) document.getElementById('vacationTravel').value = d.travelInfo;
                if (d.renovationType) document.getElementById('projectType').value = d.renovationType;

                // Map Date/Time back to specific inputs for Event/Party
                if (p.startDate) {
                    document.getElementById('eventDate').value = p.startDate;
                    document.getElementById('partyDate').value = p.startDate;
                }
                const t = d.eventTime || d.partyTime || '';
                document.getElementById('eventTime').value = t;
                document.getElementById('partyTime').value = t;

                const loc = d.eventLocation || d.partyLocation || '';
                document.getElementById('eventLocation').value = loc;
                document.getElementById('partyLocation').value = loc;

                document.getElementById('eventTickets').checked = !!d.ticketsPurchased;
                document.getElementById('partyTheme').value = d.partyTheme || '';
                document.getElementById('partyGuests').value = d.partyGuests || '';

                this.toggleContractor();
                if (d.contractorId) document.getElementById('projectContractor').value = d.contractorId;

                const matList = document.getElementById('materialsList'); matList.innerHTML = '';
                (p.materials || []).forEach(m => this.addMaterialRow(m));
                const subList = document.getElementById('subtasksContainer'); subList.innerHTML = '';
                (p.subtasks || []).forEach(t => this.addSubtaskRow(t));
                this.renderFamilySelector(p.familyMembers);

                document.getElementById('deleteProjectBtn').onclick = () => this.deleteProject(id);
                openModal('projectModal');
            },

            selectCategory(id) {
                const cat = this.state.categories.find(c => c.id === id);
                if (!cat) return;
                document.getElementById('selectedCategoryId').value = id;
                this.renderCategorySelector(id);

                // Hide all sections first
                ['fields-vacation', 'fields-event', 'fields-party', 'fields-project', 'fields-goal'].forEach(i => document.getElementById(i).classList.add('hidden'));

                // Show correct section
                const def = this.catTypes.find(t => t.name === cat.name) || this.catTypes[3];
                if (def && def.formId) document.getElementById(def.formId).classList.remove('hidden');

                // Dynamic UI Changes
                const isEventOrParty = (cat.name === 'Event' || cat.name === 'Party');
                document.getElementById('common-date-container').style.display = isEventOrParty ? 'none' : 'block';

                const lblMat = document.getElementById('lbl-materials');
                const lblSub = document.getElementById('lbl-subtasks');

                if (cat.name === 'Vacation') { lblMat.innerText = "Shopping List"; lblSub.innerText = "Packing List"; }
                else if (cat.name === 'Event' || cat.name === 'Party') { lblMat.innerText = "Things to Buy"; lblSub.innerText = "Prep Tasks"; }
                else { lblMat.innerText = "Materials"; lblSub.innerText = "Tasks"; }
            },

            saveProject(e) {
                e.preventDefault();
                const id = document.getElementById('projectId').value;
                const catId = document.getElementById('selectedCategoryId').value;
                const cat = this.state.categories.find(c => c.id === catId);
                const isEvent = cat?.name === 'Event';
                const isParty = cat?.name === 'Party';

                let startDate = document.getElementById('projectStartDate').value;
                if (isEvent) startDate = document.getElementById('eventDate').value;
                if (isParty) startDate = document.getElementById('partyDate').value;

                const timeVal = document.getElementById('eventTime').value || document.getElementById('partyTime').value;
                const locVal = document.getElementById('eventLocation').value || document.getElementById('partyLocation').value;

                const details = {
                    destination: document.getElementById('vacationDest').value,
                    accommodation: document.getElementById('vacationHotel').value,
                    travelInfo: document.getElementById('vacationTravel').value,
                    eventTime: timeVal,
                    eventLocation: locVal,
                    ticketsPurchased: document.getElementById('eventTickets').checked,
                    partyTheme: document.getElementById('partyTheme').value,
                    partyGuests: document.getElementById('partyGuests').value,
                    partyLocation: locVal,
                    partyTime: timeVal,
                    renovationType: document.getElementById('projectType').value,
                    contractorId: document.getElementById('projectContractor').value
                };

                const data = {
                    categoryId: catId,
                    name: document.getElementById('projectName').value,
                    status: document.getElementById('projectStatus').value,
                    startDate: startDate,
                    endDate: document.getElementById('projectEndDate').value,
                    quote: parseFloat(document.getElementById('projectQuote').value) || 0,
                    notes: document.getElementById('projectNotes').value,
                    description: document.getElementById('projectDescription').value,
                    details: details,
                    familyMembers: Array.from(document.querySelectorAll('.family-chk:checked')).map(c => c.value),
                    materials: Array.from(document.querySelectorAll('.mat-row input')).map(i => i.value).filter(v => v),
                    subtasks: Array.from(document.querySelectorAll('.sub-row')).map(r => ({
                        name: r.querySelector('input[type="text"]').value,
                        status: r.querySelector('input[type="checkbox"]').checked ? 'Done' : 'Pending'
                    })).filter(s => s.name)
                };

                if (id) db.put('projects', { ...data, id });
                else db.add('projects', data);
                closeModal('projectModal');
            },

            resetForm() {
                document.getElementById('projectForm').reset();
                document.getElementById('projectId').value = '';
                document.getElementById('materialsList').innerHTML = '';
                document.getElementById('subtasksContainer').innerHTML = '';
                ['vacationDest', 'vacationHotel', 'vacationTravel', 'eventTime', 'eventLocation', 'partyTheme', 'partyGuests', 'partyLocation', 'partyTime'].forEach(i => {
                    const el = document.getElementById(i); if (el) el.value = '';
                });
                this.renderCategorySelector(); this.renderFamilySelector(); this.renderContractorSelector();
            },

            getCat(id) { return this.state.categories.find(c => c.id === id) || { name: 'Other', icon: 'circle', color: 'gray' }; },
            escapeHtml(str) {
                const div = document.createElement('div');
                div.textContent = str;
                return div.innerHTML;
            },
            renderCategorySelector(selId = null) {
                document.getElementById('category-selector-container').innerHTML = this.state.categories.map(c => {
                    const def = this.catTypes.find(t => t.name === c.name) || { icon: 'circle', color: 'slate' };
                    return `<div onclick="app.selectCategory('${c.id}')" class="category-card cursor-pointer border rounded-xl p-3 text-center ${c.id === selId ? 'selected' : 'bg-white border-slate-200 text-slate-500'}"><div class="mx-auto w-8 h-8 rounded-full bg-${def.color}-100 text-${def.color}-600 flex items-center justify-center mb-2"><i data-lucide="${def.icon}" class="w-4 h-4"></i></div><span class="text-xs font-bold block truncate">${c.name}</span></div>`;
                }).join('');
                lucide.createIcons();
            },
            renderFamilySelector(sel = []) {
                document.getElementById('projectFamilyMembers').innerHTML = this.state.family.map(f => `<label class="inline-flex items-center bg-white border px-3 py-1.5 rounded-lg text-sm cursor-pointer select-none"><input type="checkbox" value="${f.name}" class="family-chk w-4 h-4 text-blue-600 rounded mr-2" ${sel.includes(f.name) ? 'checked' : ''}> ${f.name}</label>`).join('');
            },
            renderContractorSelector() {
                document.getElementById('projectContractor').innerHTML = '<option value="">Select...</option>' + this.state.contractors.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
            },
            toggleContractor() { document.getElementById('div-contractor').classList.toggle('hidden', document.getElementById('projectType').value === 'DIY'); },
            addSubtaskRow(t = {}) {
                const div = document.createElement('div'); div.className = 'sub-row flex items-center gap-2';
                div.innerHTML = `<input type="checkbox" class="w-5 h-5 rounded text-blue-600" ${t.status === 'Done' ? 'checked' : ''}><input type="text" class="flex-1 bg-transparent border-b border-transparent focus:border-blue-300 outline-none text-sm py-1" placeholder="Item..." value="${t.name || ''}"><button type="button" onclick="this.parentElement.remove()" class="text-slate-300 hover:text-red-500"><i data-lucide="x" class="w-4 h-4"></i></button>`;
                document.getElementById('subtasksContainer').appendChild(div); lucide.createIcons();
            },
            addMaterialRow(val = '') {
                const div = document.createElement('div'); div.className = 'mat-row flex gap-2';
                div.innerHTML = `<input type="text" class="flex-1 border rounded-md px-2 py-1 text-xs" placeholder="Item Name" value="${val}"><button type="button" onclick="this.parentElement.remove()" class="text-red-500"><i data-lucide="x" class="w-3 h-3"></i></button>`;
                document.getElementById('materialsList').appendChild(div); lucide.createIcons();
            },
            addListItem(type) {
                const map = { family: 'newFamilyMember', contractors: 'newContractorName' };
                const val = document.getElementById(map[type]).value;
                if (val) { db.add(type, { name: val }); document.getElementById(map[type]).value = ''; }
            },
            async deleteProject(id) { if (confirm('Delete?')) { await db.delete('projects', id); closeModal('projectModal'); } },
            async exportData() {
                const d = { projects: await db.getAll('projects'), family: await db.getAll('family'), contractors: await db.getAll('contractors'), categories: await db.getAll('categories') };
                const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([JSON.stringify(d)], { type: 'json' })); a.download = 'backup.json'; a.click();
            },
            async importData(e) {
                const file = e.target.files[0]; if (!file) return;
                const reader = new FileReader();
                reader.onload = async (ev) => { try { await db.importDB(JSON.parse(ev.target.result)); alert('Imported'); } catch (e) { alert('Error'); } };
                reader.readAsText(file);
            }
        };

        document.addEventListener('DOMContentLoaded', () => { window.app = app; app.init(); });
    </script>
</body>

</html>
